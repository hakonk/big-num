name: Swift

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

jobs:
  macOS:
    runs-on: macOS-15
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.2"
    - name: Build
      run: swift build
    - name: Run tests
      run: swift test

  linux:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Test
      run: swift test
